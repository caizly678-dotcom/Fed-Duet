hydra:
  run:
    dir: ./experiments/FedDuet/${scenario}/${dataset}_${initial_increment}-${increment}-${method}-${com}-iid
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '%(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - dataset_root=../data
    - class_order=class_orders/cifar100.yaml
    - seed=42,2005,2026
  job:
    name: main
    chdir: true
    override_dirname: class_order=class_orders/cifar100.yaml,dataset_root=../data,seed=42,2005,2026
    id: ???
    num: ???
    config_name: CIFAR_100_FedDuet_Incremental_10_iid
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.2.0
    version_base: '1.1'
    cwd: /workspace/Fed-Duet/cil
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /workspace/Fed-Duet/cil/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
class_order: class_orders/cifar100.yaml
dataset_root: ../data
workdir: ''
log_path: metrics.jsonl
model_name: ViT-B/16
prompt_template: a bad photo of a {}.
compress: false
batch_size: 16
increment: ${initial_increment}
initial_increment: 10
scenario: class
dataset: cifar100
class_num: 100
lr: 3.0e-05
method: CIFAR_100_FedDuet_Incremental_10_iid
use_FedDuet: true
federated: true
iid: true
num_clients: 5
com: 10
client_epochs: 1
use_MoE_Adapters: true
fp16: true
mixed_precision: fp16
device: cuda
gpu: 1
seed: 42
num_experts: 8
n_shared_experts: 1
top_k: 2
use_mlp: true
gradient_accumulation_steps: 2
